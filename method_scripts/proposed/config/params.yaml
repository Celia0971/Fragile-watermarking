# ============================================================
# Proposed Scheme: IBLT + Group-Testing Fragile Watermarking
# Reference configuration (paper §7.5): m=5, s=5, r=5, b=256, δ=2^{-20}
# ============================================================

# Primary key column
pk_col: "id"

# Secret key (keep private; used for all HMAC computations)
secret_key: "Proposed_IBLT_GT_SecretKey_v1"

# Attribute columns to include in digest (null = all non-PK columns)
all_cols: null

# ─────────────────────────────────────────────────────────────
# Layer 1: IBLT parameters
# ─────────────────────────────────────────────────────────────

# IBLT provisioning mode (paper §7.5):
#   "basic"             : C_pk = iblt_capacity (from config; use s+r for within-budget E1)
#   "storage_optimized" : C_pk = ⌈1.1 × 0.20 × n⌉ (Table 6 formula; use for E2/E3)
iblt_mode: "storage_optimized"

# Used only when iblt_mode = "basic":
# C_pk = s + r = 5 + 5 = 10 for within-budget reference config.
iblt_capacity: 10

# Load factor α_IBLT ≥ 1.5 recommended for reliable peeling  [Theorem 3.2].
iblt_mult: 1.5

# k: number of IBLT hash functions (k=3 standard).
iblt_k: 3

# ─────────────────────────────────────────────────────────────
# Layer 2: Group-testing parameters
# ─────────────────────────────────────────────────────────────

# NOTE: g is NOT set here. embed.py computes g automatically from paper Eq. 12:
#   p = 1/(m + s_del + 1),  π_{m,r} = p(1-p)^{m+s_del}
#   g = ⌈(ln n + ln C(n-1,m) + ln(1/δ)) / π_{m,r}⌉
# This ensures the Bernoulli clean-separation guarantee (Theorem 4.4) holds
# for the actual dataset size n. Typical values: ~2000–2600 for n=30k–600k.
#
# Optional: set gt_g_min to enforce a minimum g (e.g. for tiny test datasets).
# gt_g_min: 100

# δ: target grouping failure probability  [Theorem 4.4].
# Paper reference: δ = 2^{-20} ≈ 9.54e-7.
delta: 9.54e-7

# b: group digest width in bits  [Eq. 26, §7.5 reference: b=256].
# Controls the XOR digest-cancellation bound: mg2^{-b}  [Theorem 5.3].
# Larger b → lower false-negative probability but more storage.
gt_b: 128

# m: modification tolerance — Layer 2 localizes up to m value-modified tuples exactly.
gt_m: 5

# s_del (= r): deletion tolerance used in p = 1/(m + s_del + 1)  [Eq. 11].
# Also controls how many deleted-key groups are discarded in Layer 2.
gt_s_del: 5

# ─────────────────────────────────────────────────────────────
# Detection mode
# ─────────────────────────────────────────────────────────────

# "compressed" : group-testing decoder (paper's proposed scheme — stores only g syndromes)
# "full"       : per-tuple digest comparison (requires tuple_digests stored at embed time)
detection_mode: "compressed"
